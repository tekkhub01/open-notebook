services:
  surrealdb:
    image: surrealdb/surrealdb:v2
    command: start --log info --user root --pass root rocksdb:/mydata/mydatabase.db
    user: root
    ports:
      - "8000:8000"
    volumes:
      - ./surreal_data:/mydata
    environment:
      - SURREAL_EXPERIMENTAL_GRAPHQL=true
    restart: always
    pull_policy: always

  open_notebook:
    build:
      context: .
      dockerfile: Dockerfile
    # Ports exposed only internally - nginx handles external access
    expose:
      - "8502"  # Web UI
      - "5055"  # REST API
    environment:
      - OPEN_NOTEBOOK_ENCRYPTION_KEY=6e94cd81786ef463356836b697faae972acefd916306ccdf5643cacd69fe0195
      - SURREAL_URL=ws://surrealdb:8000/rpc
      - SURREAL_USER=root
      - SURREAL_PASSWORD=root
      - SURREAL_NAMESPACE=open_notebook
      - SURREAL_DATABASE=open_notebook
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    volumes:
      - ./notebook_data:/app/data
    depends_on:
      - surrealdb
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "5055:5055"   # HTTPS on port 5055
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - open_notebook
    restart: always

  surrealist:
    image: surrealdb/surrealist:latest
    ports:
      - "8080:8080"
    depends_on:
      - surrealdb
    restart: always
