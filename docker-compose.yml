services:
  surrealdb:
    image: surrealdb/surrealdb:v2
    command: start --log info --user root --pass root rocksdb:/mydata/mydatabase.db
    user: root  # Required for bind mounts on Linux
    ports:
      - "8000:8000"
    volumes:
      - ./surreal_data:/mydata
    environment:
      - SURREAL_EXPERIMENTAL_GRAPHQL=true
    restart: always
    pull_policy: always

  open_notebook:
    image: lfnovo/open_notebook:v1-latest
    ports:
      - "8502:8502"  # Web UI
      - "5056:5055"  # REST API direct (HTTP, for frontend access via Tailscale)
    environment:
      - API_URL=http://brix-ia-linux.tail216abe.ts.net:5056
      - OPEN_NOTEBOOK_ENCRYPTION_KEY=6e94cd81786ef463356836b697faae972acefd916306ccdf5643cacd69fe0195
      - SURREAL_URL=ws://surrealdb:8000/rpc
      - SURREAL_USER=root
      - SURREAL_PASSWORD=root
      - SURREAL_NAMESPACE=open_notebook
      - SURREAL_DATABASE=open_notebook
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - ./notebook_data:/app/data
      # Mount custom backend code over the image defaults
      - ./open_notebook/database/migrations:/app/open_notebook/database/migrations:ro
      - ./open_notebook/database/async_migrate.py:/app/open_notebook/database/async_migrate.py:ro
      - ./open_notebook/domain/notebook.py:/app/open_notebook/domain/notebook.py:ro
      - ./open_notebook/graphs/ask.py:/app/open_notebook/graphs/ask.py:ro
      - ./api/models.py:/app/api/models.py:ro
      - ./api/routers/search.py:/app/api/routers/search.py:ro
      - ./api/routers/chat_rag.py:/app/api/routers/chat_rag.py:ro
      - ./api/main.py:/app/api/main.py:ro
      - ./prompts:/app/prompts:ro
    depends_on:
      - surrealdb
    restart: always
    pull_policy: always

  ai_widget:
    build:
      context: ../ai-widget
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - OPEN_NOTEBOOK_ENDPOINT=http://open_notebook:5055
      - OPEN_NOTEBOOK_NOTEBOOK_ID=notebook:wcey1gczvhr6vbdxyyn5
      - OPEN_NOTEBOOK_STRATEGY_MODEL=model:8bk5wmrp1mksgceysphg
      - OPEN_NOTEBOOK_CHAT_MODEL=model:8bk5wmrp1mksgceysphg
    expose:
      - "3000"
    depends_on:
      - open_notebook
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "5055:5055" # Open-Notebook API (HTTPS)
      - "3000:3000" # AI Widget (HTTPS, LAN)
      - "5555:5555" # AI Widget (HTTPS, public via router NAT)
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - open_notebook
      - ai_widget
    restart: always
